<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cahier de Tendances | SPORTFIVE</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <h1>SPORTFIVE<span>_</span></h1>
                <p>Trend Book SEP</p>
            </div>
            <nav class="filters">
                <h3>Semaines</h3>
                <div class="custom-select-wrapper" style="margin-bottom: 25px;">
                    <select id="week-selector"
                        style="width: 100%; padding: 10px; background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; font-family: 'Inter', sans-serif;">
                        <!-- Options injectées par JS -->
                    </select>
                </div>
                <h3>Thématiques</h3>
                <ul id="filter-list">
                    <li class="active" data-filter="all">Toutes les tendances</li>
                    <li data-filter="Créativité & Structuration des Agences">Créativité & Structuration des Agences</li>
                    <li data-filter="Innovation & Outils">Innovation & Outils</li>
                    <li data-filter="Mesure du ROI & Business">Mesure du ROI & Business</li>
                    <li data-filter="Tendances & Insights (Société)">Tendances & Insights (Société)</li>
                    <li data-filter="Omnicanalité & Nouveaux Médias">Omnicanalité & Nouveaux Médias</li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2>Vue Galerie (Semaine Actuelle)</h2>
                <div class="user-profile">
                    <span>Projet SEP : B. Malet</span>
                </div>
            </header>

            <!-- Cards Grid -->
            <section class="kanban-board" id="trends-grid">
                <!-- Les cartes seront injectées ici par Javascript -->
            </section>
        </main>
    </div>

    <!-- Modal pour afficher l'analyse complète -->
    <div class="modal" id="trend-modal">
        <div class="modal-content glass-effect">
            <span class="close-btn">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
